model_name: "Heuristic Risk Model"
model_version: "2.0.0"

thresholds:
  low_max: 39
  medium_max: 69

weights:
  uppercase_excess: 10
  exclamation_excess: 8
  sensational_phrase: 8
  conspiracy_phrase: 14
  share_call: 12
  absolute_claim: 10
  urgency_phrase: 9
  short_content: 8
  emotional_alarmist: 8
  author_anonymous: 10
  link_no_https: 8
  link_invalid: 10
  suspicious_domain: 12
  source_link_mismatch: 6
  link_unreachable: 10
  link_redirect_domain: 8
  link_not_html: 5
  title_link_mismatch: 9
  page_without_title: 4
  multi_source_support_bonus: 15
  weak_corroboration_penalty: 10
  fact_check_false_penalty: 20
  fact_check_false_risk_floor: 82
  fact_check_true_bonus: 15
  no_factcheck_risk_floor: 28

categories:
  text_signals:
    - "uso excesivo de mayúsculas"
    - "exceso de signos de exclamación"
    - "uso de lenguaje sensacionalista"
    - "frases conspirativas"
    - "llamado emocional a compartir"
    - "afirmaciones absolutas sin contexto"
    - "frases de urgencia extrema"
    - "contenido demasiado corto o poco informativo"
    - "lenguaje emocional o alarmista"
  metadata_signals:
    - "autor anónimo o no verificable"
    - "enlace sin https"
    - "enlace inválido o sospechoso"
    - "dominio raro o poco confiable"
    - "fuente inconsistente con el enlace"
  web_signals:
    - "no se pudo verificar el enlace en la web"
    - "el enlace redirige a un dominio distinto"
    - "el enlace no parece una pagina informativa HTML"
    - "baja consistencia entre titulo enviado y pagina enlazada"
    - "la pagina enlazada no expone titulo verificable"

trusted_sources:
  - "reuters"
  - "bbc"
  - "ap news"
  - "cnn"
  - "el pais"
  - "dw"
  - "france 24"
  - "the guardian"
  - "new york times"
  - "washington post"
